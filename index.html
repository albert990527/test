<style>

  .modal-b{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
  .modal-f{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
  .x{border:0;background:none;font-size:20px;color:var(--ink-faint);line-height:1;padding:2px 6px;border-radius:6px}.x:hover{background:var(--surface-2);color:var(--ink)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:80;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;bottom:30px}

  .loader{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--ink-soft);gap:10px;font-size:14px}
  .spin{width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* sync diff */
  .diffgrp{border:1px solid var(--line);border-radius:10px;overflow:hidden}

  @media(max-width:860px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto}.nav{flex-direction:row;overflow-x:auto}.nav button{white-space:nowrap}.side-foot{display:none}
    main{padding:16px 14px 50px}.grid2{grid-template-columns:1fr}

</style>

<script>
"use strict";
const STORE_KEY="ta_grade_system_v3";

/* ---------- 資料結構 ---------- */
function newClass(name){
  return { id:uid(), name:name||"新班級", term:"1122",
    settings:{ weights:{attendance:30, grade:70}, missingAsZero:true, passLine:60 },
    students:[], gradeItems:[], grades:{}, attDirect:{}, perfLog:[] };
}
function defaultState(){ return { activeClass:null, classes:[] }; }

/* ---------- 工具 ---------- */
function uid(){ return Math.random().toString(36).slice(2,9); }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmt(n,d=1){ return (n==null||isNaN(n))?"—":Number(n).toFixed(d); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function cleanName(s){ return String(s==null?"":s).replace(/\s*[\(（][^）)]*[\)）]\s*$/,"").trim(); }

let S=defaultState(), view="dash", gradeTab="all", sortFinal={key:"final",dir:-1}, pendingSync=null;
function C(){ return S.classes.find(c=>c.id===S.activeClass)||null; }

/* ---------- 儲存 ---------- */
let saveTimer=null;
async function loadState(){
  // 清除舊版(v1/v2)殘留,避免舊的預設/範例資料復活
  ["ta_grade_system_v1","ta_grade_system_v2"].forEach(async k=>{ try{ await window.storage.delete(k); }catch(e){} });
  try{ const r=await window.storage.get(STORE_KEY); if(r&&r.value) S=migrate(JSON.parse(r.value)); }catch(e){}
  if(!S.classes) S.classes=[];
  if(!S.activeClass && S.classes.length) S.activeClass=S.classes[0].id;
}
function migrate(p){ const s=Object.assign(defaultState(),p);
  if(!Array.isArray(s.classes)) s.classes=[];
  s.classes.forEach(c=>{ c.perfLog=c.perfLog||[]; c.attDirect=c.attDirect||{}; c.grades=c.grades||{};
    c.gradeItems=(c.gradeItems||[]).map(i=>Object.assign({max:100},i));
    c.settings=Object.assign({weights:{attendance:30,grade:70},missingAsZero:true,passLine:60},c.settings||{});
    delete c.sessions; delete c.attendance; });
  return s; }
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(async()=>{
  try{ await window.storage.set(STORE_KEY, JSON.stringify(S)); }catch(e){ toast("儲存失敗,本次暫存"); } },300); }

/* ---------- 計算 ---------- */
function attendanceScore(cls,sid){ const v=cls.attDirect[sid]; return (v==null||v===""||isNaN(v))?null:clamp(+v,0,100); }
function gradeScore(cls,sid){
  const items=cls.gradeItems; if(!items.length) return null;
  const g=cls.grades[sid]||{}, zero=cls.settings.missingAsZero;
  let sum=0,wsum=0,any=false;
  items.forEach(i=>{ const v=g[i.id],w=(+i.weight||0),mx=(+i.max)||100; const has=(v!=null&&v!==""&&!isNaN(v));
    if(has){ sum+=((+v)/mx*100)*w; wsum+=w; any=true; } else if(zero){ wsum+=w; } });
  if(!any&&!zero) return null;
  return wsum? sum/wsum : (zero?0:null);
}
function bonusOf(cls,sid){ return (cls.perfLog||[]).filter(e=>e.studentId===sid).reduce((a,e)=>a+(+e.bonus||0),0); }
function compute(cls,sid){
  const w=cls.settings.weights;
  const a=attendanceScore(cls,sid), g=gradeScore(cls,sid), bonus=bonusOf(cls,sid);
  const av=a??0, gv=g??0;
  const final=clamp(av*w.attendance/100 + gv*w.grade/100 + bonus, 0, 100);
  return {a,g,bonus,final,contrib:{att:av*w.attendance/100, grd:gv*w.grade/100}};
}
function weightTotal(cls){ const w=cls.settings.weights; return (+w.attendance||0)+(+w.grade||0); }
function classAttRate(cls){ const a=cls.students.map(s=>attendanceScore(cls,s.id)).filter(v=>v!=null); return a.length?a.reduce((x,y)=>x+y,0)/a.length:null; }

/* 問題診斷 */
function diagnose(cls,sid){
  const out=[]; const a=attendanceScore(cls,sid);
  if(a!=null && a<60) out.push("點名太少");
  const g=cls.grades[sid]||{};
  const miss=i=>{ const v=g[i.id]; return v==null||v===""||isNaN(v); };
  const ex=cls.gradeItems.filter(i=>i.category==="考試"&&miss(i)).length;
  const hw=cls.gradeItems.filter(i=>i.category==="作業"&&miss(i)).length;
  if(ex) out.push("考試缺考×"+ex);
  if(hw) out.push("作業未交×"+hw);
  const gs=gradeScore(cls,sid);
  if(gs!=null && gs<cls.settings.passLine) out.push("成績偏低");
  return out;
}
function probTags(cls,sid){ const d=diagnose(cls,sid);
  return d.length? d.map(t=>`<span class="badge bad" style="margin:1px 2px">${esc(t)}</span>`).join("") : '<span style="color:var(--ink-faint)">—</span>'; }

/* ---------- 檔案解析(平台格式 xlsx / csv) ---------- */
function parseGrid(rows){
  // 找表頭列:某列含「帳號」或「姓名」
  let h=-1;
  for(let i=0;i<Math.min(rows.length,30);i++){ const row=(rows[i]||[]).map(x=>String(x==null?"":x).trim());
    if(row.includes("帳號")||row.includes("姓名")){ h=i; break; } }
  if(h<0) throw new Error("找不到表頭(需有「帳號」或「姓名」欄)");
  const hdr=rows[h].map(x=>String(x==null?"":x));
  const findCol=re=>hdr.findIndex(x=>re.test(x));
  const col={ sid:findCol(/帳號/), seat:findCol(/座號/), name:findCol(/姓名/), dept:findCol(/院系/), group:findCol(/班級/) };
  if(col.sid<0 && col.name<0) throw new Error("表頭需要有「帳號」或「姓名」欄");
  const attCol=findCol(/點名/);   // 可省略,-1 表示沒有點名欄
  // 身分/尾欄範圍
  const idIdx=[col.sid,col.seat,col.name,col.dept,col.group].filter(i=>i>=0);
  const maxId=idIdx.length?Math.max(...idIdx):0;
  let endCol=hdr.length;
  [/原始成績/,/最終成績/,/備註/,/退選/].forEach(re=>{ const i=findCol(re); if(i>maxId && i<endCol) endCol=i; });
  // 第二層表頭(合併群組下的細項名)
  const next=rows[h+1]||[];
  const anchor = col.sid>=0?col.sid:(col.name>=0?col.name:0);
  const av=String((next[anchor]==null?"":next[anchor])).trim();
  const nextIsData = col.sid>=0 ? (av!=="" && /\d/.test(av)) : (av!=="");
  const idSet=new Set(idIdx);
  const itemCols=[];
  for(let c=maxId+1;c<endCol;c++){
    if(c===attCol||idSet.has(c)) continue;
    let nm = (!nextIsData && next[c]!=null && String(next[c]).trim()!=="") ? next[c] : hdr[c];
    nm=cleanName(nm);
    if(nm) itemCols.push({col:c,name:nm});
  }
  const start = nextIsData ? h+1 : h+2;
  const num=v=>{ if(v==null||v===""||String(v).trim()==="未繳") return null; const n=Number(v); return isNaN(n)?null:n; };
  const cell=(r,i)=> (i>=0 && r[i]!=null) ? String(r[i]).trim() : "";
  const out=[];
  for(let i=start;i<rows.length;i++){
    const r=rows[i]||[];
    const sid=cell(r,col.sid), name=cell(r,col.name);
    if(sid==="" && name==="") continue;
    if(/教師|合計|平均|總計/.test(sid+name)) continue;
    out.push({ sid, seat:cell(r,col.seat), name, dept:cell(r,col.dept), group:cell(r,col.group),
      att: attCol>=0?num(r[attCol]):null, scores:itemCols.map(ic=>num(r[ic.col])) });
  }
  return { items:itemCols.map(x=>x.name), hasAtt:attCol>=0, rows:out };
}
function parseCSVText(text){
  const rows=[]; let cur=[],val="",q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){ val+='"'; i++; } else q=false; } else val+=ch; }
    else if(ch==='"') q=true;
    else if(ch===","){ cur.push(val); val=""; }
    else if(ch==="\n"){ cur.push(val); rows.push(cur); cur=[]; val=""; }
    else if(ch!=="\r") val+=ch; }
  if(val!==""||cur.length){ cur.push(val); rows.push(cur); }
  return rows;
}
function readFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onerror=()=>rej(new Error("讀取檔案失敗"));
    if(/\.csv$/i.test(file.name)){
      r.onload=()=>{ try{ res(parseGrid(parseCSVText(String(r.result).replace(/^\ufeff/,"")))); }catch(e){ rej(e); } };
      r.readAsText(file,"utf-8");
    } else {
      r.onload=()=>{ try{
        if(!window.XLSX) throw new Error("Excel 解析元件未載入(需連上網路),請改上傳 CSV");
        const wb=XLSX.read(new Uint8Array(r.result),{type:"array"});
        const ws=wb.Sheets[wb.SheetNames.includes("匯總")?"匯總":wb.SheetNames[0]];
        res(parseGrid(XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null})));
      }catch(e){ rej(e); } };
      r.readAsArrayBuffer(file);
    }
  });
}

/* ---------- 同步比對 ---------- */
function planSync(cls,parsed){
  const plan={newItems:[],newStu:[],updStu:[],updAtt:[],updGrade:[],matched:0,same:0};
  // 欄位(成績項目):名稱已存在→沿用;不存在→新增
  const byName={}; cls.gradeItems.forEach(i=>byName[i.name]=i);
  parsed.items.forEach(nm=>{ if(!byName[nm]){ const it={id:uid(),name:nm,category:/作業/.test(nm)?"作業":"考試",weight:0,max:100,_new:true};
    byName[nm]=it; plan.newItems.push(it); } });
  const used=new Set();
  const matchStu=r=>{
    // 先以帳號對齊
    if(r.sid){ const s=cls.students.find(x=>x.sid && String(x.sid)===String(r.sid)); if(s) return s; }
    // 帳號對不到→以姓名對齊(需唯一且未被用過)
    if(r.name){ const cand=cls.students.filter(x=>x.name && x.name===r.name && !used.has(x.id)); if(cand.length===1) return cand[0]; }
    return null;
  };
  parsed.rows.forEach(r=>{
    const s=matchStu(r);
    if(!s){ plan.newStu.push(r); return; }
    used.add(s.id); plan.matched++;
    // 帳號視為可更新欄位(以姓名對齊時,帳號若不同會被更新/補上)
    ["sid","seat","name","dept","group"].forEach(f=>{ const ov=String(s[f]||""), nv=String(r[f]||"");
      if(nv!=="" && ov!==nv) plan.updStu.push({sid:s.id,acct:s.sid,name:s.name,field:f,from:ov,to:nv}); });
    if(parsed.hasAtt){   // 檔案沒有點名欄時,完全不動點名成績
      const oa=cls.attDirect[s.id];
      const sameAtt=(oa==null&&r.att==null)||(oa!=null&&r.att!=null&&Number(oa)===Number(r.att));
      if(!sameAtt) plan.updAtt.push({sid:s.id,acct:s.sid,name:s.name,from:oa,to:r.att});
    }
    parsed.items.forEach((nm,ix)=>{ const it=byName[nm]; const nv=r.scores[ix];
      const ov=it._new?undefined:(cls.grades[s.id]||{})[it.id];
      const oNull=(ov==null||ov===""||isNaN(ov)), nNull=(nv==null);
      if(oNull&&nNull) return;
      if(!oNull&&!nNull&&Number(ov)===Number(nv)){ plan.same++; return; }
      plan.updGrade.push({sid:s.id,acct:s.sid,name:s.name,item:it,itemName:nm,from:oNull?null:ov,to:nv}); });
  });
  plan.total=plan.newItems.length+plan.newStu.length+plan.updStu.length+plan.updAtt.length+plan.updGrade.length;
  return plan;
}
function applySync(cls,plan,parsed){
  plan.newItems.forEach(it=>{ const c={id:it.id,name:it.name,category:it.category,weight:it.weight,max:it.max}; cls.gradeItems.push(c); });
  plan.newStu.forEach(r=>{ const id=uid();
    cls.students.push({id,sid:r.sid,seat:r.seat,name:r.name,dept:r.dept,group:r.group});
    if(r.att!=null) cls.attDirect[id]=r.att;
    cls.grades[id]={};
    const byName={}; cls.gradeItems.forEach(i=>byName[i.name]=i);
    parsed.items.forEach((nm,ix)=>{ const it=byName[nm]; const v=r.scores[ix]; if(it&&v!=null) cls.grades[id][it.id]=v; }); });
  plan.updStu.forEach(u=>{ const s=cls.students.find(x=>x.id===u.sid); if(s) s[u.field]=u.to; });
  plan.updAtt.forEach(u=>{ if(u.to==null) delete cls.attDirect[u.sid]; else cls.attDirect[u.sid]=u.to; });
  plan.updGrade.forEach(u=>{ cls.grades[u.sid]=cls.grades[u.sid]||{};
    if(u.to==null) delete cls.grades[u.sid][u.item.id]; else cls.grades[u.sid][u.item.id]=u.to; });
  save();
}

function shell(inner){
  const items=[["dash","儀表板","▤"],["roster","學生名單","☰"],["attend","點名成績","◉"],
    ["grades","成績登錄","✎"],["perf","課堂績效","★"],["final","混合成績","∑"],["sync","匯入更新","⟳"],["settings","設定","⚙"]];
  return `<div class="app"><aside class="side">
      <div class="brand"><span class="seal">TA</span><div><b>成績系統</b><small>MULTI-CLASS</small></div></div>
      <nav><ul class="nav">${items.map(([k,l,i])=>`<li><button data-nav="${k}" class="${view===k?'on':''}"><span class="ico">${i}</span>${l}</button></li>`).join("")}</ul></nav>
      <div class="side-foot">資料自動儲存於此瀏覽器帳號。可於設定匯出備份。</div>

function topbar(){
  if(!S.classes.length) return "";
  return `<div class="topbar"><div class="clswitch"><label>目前班級</label>
      <select id="clsel">${S.classes.map(c=>`<option value="${c.id}" ${c.id===S.activeClass?'selected':''}>${esc(c.name)}</option>`).join("")}</select>

    <div class="hint">共 ${S.classes.length} 個班級 · ${S.classes.reduce((a,c)=>a+c.students.length,0)} 位學生</div></div>`;
}
function head(title,sub){ const cls=C(); if(!cls) return `<div class="head"><div><h1>${esc(title)}</h1></div></div>`;
  return `<div class="head"><div><h1>${esc(title)}</h1><p>${sub||esc(cls.name)+' · '+esc(cls.term)}</p></div></div>`; }
function body(){ if(!S.classes.length) return firstRun();

/* 混合成績 */
function finalView(){
  const cls=C(), st=cls.students;
  if(!st.length) return head("混合成績")+needStu();
  let rows=st.map(s=>({s,c:compute(cls,s.id)}));
  const k=sortFinal.key,d=sortFinal.dir;
  rows.sort((x,y)=>{ if(k==="name") return x.s.name.localeCompare(y.s.name,'zh-Hant')*d;
    if(k==="sid") return String(x.s.sid).localeCompare(String(y.s.sid))*d;
    const A=k==="att"?(x.c.a??-1):k==="grd"?(x.c.g??-1):x.c.final, B=k==="att"?(y.c.a??-1):k==="grd"?(y.c.g??-1):y.c.final;
    return (A-B)*d; });
  const maxC=Math.max(1,...rows.map(r=>r.c.contrib.att+r.c.contrib.grd));
  const ar=key=>k===key?(d<0?' ▾':' ▴'):'';
  return head("混合成績")+`

        <th class="c" style="width:62px">狀態</th><th style="width:180px">問題</th></tr></thead>
      <tbody>${rows.map(r=>{const c=r.c,sc=100/maxC;return `<tr>
        <td class="sid">${esc(r.s.sid)}</td>

        <td><div class="compbar" title="點名 ${fmt(c.contrib.att)}｜成績 ${fmt(c.contrib.grd)}"><i class="comp-att" style="width:${c.contrib.att*sc}%"></i><i class="comp-grd" style="width:${c.contrib.grd*sc}%"></i></div></td>

        <td class="c">${badge(cls,c.final)}</td><td>${probTags(cls,r.s.id)}</td></tr>`;}).join("")}</tbody></table></div></div></div>`;
}

        <b>把檔案拖曳到這裡,或</b> <button class="btn pri sm" id="pick">選擇檔案</button>
        <p class="hint" style="margin:10px 0 0">將匯入至目前班級:<b>${esc(cls.name)}</b>(切換上方班級可換目標)</p>
      </div>
      <p class="hint" style="margin-top:12px">
        · <b>對齊學生</b>:先比帳號,帳號對不到再比姓名(姓名唯一即可);其一對上就視為同一人<br>
        · <b>欄位已存在</b>(如「小考1」)→ 只比對分數,有變動才更新<br>
        · <b>欄位不存在</b> → 新增為成績項目(需自行設定配分與滿分)<br>
        · <b>對得上</b> → 更新有變動的資料(帳號/座號/姓名/院系/班級/點名/分數)<br>
        · <b>對不上</b> → 新增此學生<br>
        · <b>點名欄可有可無</b>:沒有點名欄時不會動到既有點名成績<br>
        · 標記「未繳」視為未繳交(空白)
      </p>
    </div></div>
  ${p?diffCard(p):""}`;
}
function diffCard(p){
  const plan=p.plan;
  const grp=(title,n,color,html)=>n?`<details class="diffgrp" ${n<=12?'open':''}><summary><span>${title}</span><span class="badge ${color}">${n}</span></summary><div class="difflist">${html}</div></details>`:"";
  const v=x=>x==null?'<span style="color:var(--ink-faint)">未繳</span>':`<span class="num">${x}</span>`;
  return `<div class="card"><div class="card-h"><div><h2>比對結果 · ${esc(p.fileName)}</h2>
      <div class="sub">檔案 ${p.parsed.rows.length} 筆 · 對到 ${plan.matched} 人 · 未變動 ${plan.same} 個分數</div></div>
    <div class="row"><button class="btn" id="syncCancel">取消</button><button class="btn gold" id="syncApply">套用 ${plan.total} 項變更</button></div></div>
    <div class="card-b" style="display:flex;flex-direction:column;gap:10px">
      ${plan.total===0?`<div class="empty" style="padding:24px"><h3>資料已是最新 ✓</h3><p>檔案內容與目前班級完全一致,沒有需要更新的項目。</p></div>`:""}
      ${grp("新增成績項目(欄位)",plan.newItems.length,"add",`<table>${plan.newItems.map(i=>`<tr><td><b>${esc(i.name)}</b></td><td><span class="grp">${esc(i.category)}</span></td><td class="hint">新欄位 · 配分與滿分預設 0 / 100,請至成績登錄調整</td></tr>`).join("")}</table>`)}
      ${grp("新增學生",plan.newStu.length,"add",`<table>${plan.newStu.map(r=>`<tr><td class="num">${esc(r.sid)}</td><td><b>${esc(r.name)}</b></td><td>${esc(r.dept)}</td><td>${esc(r.group)}</td><td class="hint">點名 ${r.att==null?'—':r.att}</td></tr>`).join("")}</table>`)}
      ${grp("更新點名成績",plan.updAtt.length,"chg",`<table>${plan.updAtt.map(u=>`<tr><td class="num">${esc(u.acct)}</td><td>${esc(u.name)}</td><td class="r"><span class="oldv">${u.from==null?'—':u.from}</span><span class="arrow">→</span><span class="newv">${u.to==null?'—':u.to}</span></td></tr>`).join("")}</table>`)}
      ${grp("更新成績分數",plan.updGrade.length,"chg",`<table>${plan.updGrade.map(u=>`<tr><td class="num">${esc(u.acct)}</td><td>${esc(u.name)}</td><td><span class="grp">${esc(u.itemName)}</span></td><td class="r"><span class="oldv">${u.from==null?'未繳':u.from}</span><span class="arrow">→</span><span class="newv">${u.to==null?'未繳':u.to}</span></td></tr>`).join("")}</table>`)}
      ${grp("更新學生資料",plan.updStu.length,"chg",`<table>${plan.updStu.map(u=>`<tr><td class="num">${esc(u.acct)}</td><td>${esc(u.name)}</td><td class="grp">${esc({sid:'帳號',seat:'座號',name:'姓名',dept:'院系',group:'班級'}[u.field])}</td><td class="r"><span class="oldv">${esc(u.from)||'—'}</span><span class="arrow">→</span><span class="newv">${esc(u.to)}</span></td></tr>`).join("")}</table>`)}
    </div></div>`;
}

function badge(cls,f){ const p=cls.settings.passLine;
  if(f>=Math.max(p+20,80)) return `<span class="badge ok">優良</span>`;
  if(f>=p) return `<span class="badge ok">及格</span>`;

  return `<span class="badge bad">不及格</span>`; }

  bindAll("#expCsv",exportCSV);

    drop.ondrop=e=>{ e.preventDefault(); drop.classList.remove("hot"); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); }; }
  bindAll("#syncCancel",()=>{ pendingSync=null; render(); });
  bindAll("#syncApply",()=>{ const cls=C(); applySync(cls,pendingSync.plan,pendingSync.parsed);
    const n=pendingSync.plan.total; pendingSync=null; view="final"; render(); toast("已套用 "+n+" 項變更"); });

  document.querySelectorAll("[data-set]").forEach(inp=>inp.onchange=()=>{ C()[inp.dataset.set]=inp.value; save(); render(); });
  document.querySelectorAll("[data-sets]").forEach(inp=>inp.onchange=()=>{ C().settings[inp.dataset.sets]=clamp(+inp.value||0,0,100); save(); render(); });

function bindAll(sel,fn){ document.querySelectorAll(sel).forEach(el=>el.onclick=fn); }
function enterBlur(inp){ inp.onkeydown=e=>{ if(e.key==="Enter") inp.blur(); }; }

function fileDialog(){ const i=document.createElement("input"); i.type="file"; i.accept=".xlsx,.xls,.csv";
  i.onchange=()=>{ if(i.files[0]) handleFile(i.files[0]); }; i.click(); }
async function handleFile(file){
  const cls=C();
  try{
    const parsed=await readFile(file);
    if(!parsed.rows.length){ toast("檔案中沒有讀到學生資料"); return; }
    const plan=planSync(cls,parsed);
    const proceed=()=>{ pendingSync={fileName:file.name,parsed,plan}; view="sync"; render();
      toast(plan.total?("比對完成:"+plan.total+" 項變更"):"資料已是最新"); };
    if(cls.students.length && plan.matched===0)
      askConfirm("這個檔案的帳號和「"+cls.name+"」完全對不上,可能選錯班級了。\n仍要繼續嗎?(會全部視為新學生)",proceed,"仍要繼續");
    else proceed();
  }catch(e){ toast("讀取失敗:"+(e.message||e)); }
}

/* ---------- Modal ---------- */
function modal(title,html,onSave,saveLabel="儲存"){
  const ov=document.createElement("div"); ov.className="ov";
  ov.innerHTML=`<div class="modal"><div class="modal-h">${esc(title)}<button class="x">×</button></div><div class="modal-b">${html}</div>
    <div class="modal-f"><button class="btn" data-cancel>取消</button><button class="btn pri" data-ok>${esc(saveLabel)}</button></div></div>`;
  document.body.appendChild(ov); const close=()=>ov.remove();
  ov.querySelector(".x").onclick=close; ov.querySelector("[data-cancel]").onclick=close; ov.onclick=e=>{ if(e.target===ov) close(); };
  ov.querySelector("[data-ok]").onclick=()=>{ if(onSave(ov)!==false) close(); };
  const f=ov.querySelector("input,textarea,select"); if(f) f.focus(); return ov;
}
function askConfirm(msg,onYes,yesLabel="確定",danger=false){
  const ov=document.createElement("div"); ov.className="ov";
  ov.innerHTML=`<div class="modal" style="max-width:420px"><div class="modal-h">請確認<button class="x">×</button></div>
    <div class="modal-b"><p style="margin:0;line-height:1.7;white-space:pre-line">${esc(msg)}</p></div>
    <div class="modal-f"><button class="btn" data-no>取消</button><button class="btn ${danger?'danger':'pri'}" data-yes>${esc(yesLabel)}</button></div></div>`;
  document.body.appendChild(ov); const close=()=>ov.remove();
  ov.querySelector(".x").onclick=close; ov.querySelector("[data-no]").onclick=close; ov.onclick=e=>{ if(e.target===ov) close(); };
  ov.querySelector("[data-yes]").onclick=()=>{ close(); onYes(); };
}

/* ---------- 匯出/匯入 ---------- */
function download(name,text,type="text/plain"){ const b=new Blob(["\ufeff"+text],{type}),u=URL.createObjectURL(b);
  const a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function exportCSV(){ const cls=C(), items=cls.gradeItems;
  const hdr=["帳號","座號","姓名","院系","班級","點名成績",...items.map(i=>i.name+"(/"+((+i.max)||100)+")"),"加權成績","加分","混合成績","狀態","問題"];
  const lines=[hdr.join(",")];
  cls.students.forEach(s=>{ const c=compute(cls,s.id), g=cls.grades[s.id]||{};
    const row=[s.sid,s.seat,s.name,s.dept,s.group,c.a==null?"":c.a,...items.map(i=>g[i.id]??"未繳"),fmt(c.g),c.bonus,fmt(c.final),
      c.final>=cls.settings.passLine?"及格":"不及格", diagnose(cls,s.id).join(" / ")];
    lines.push(row.map(x=>`"${String(x??"").replace(/"/g,'""')}"`).join(",")); });
  download(cls.name+"_混合成績_"+todayISO()+".csv",lines.join("\n"),"text/csv"); toast("已匯出 CSV"); }
function exportJSON(){ download("成績系統備份_"+todayISO()+".json",JSON.stringify(S,null,1),"application/json"); toast("已匯出備份"); }
function importJSON(){ const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.classes||!Array.isArray(d.classes)) throw 0;
      askConfirm("匯入將覆蓋目前所有班級,確定?",()=>{ S=migrate(d); if(!S.activeClass&&S.classes.length) S.activeClass=S.classes[0].id;
        save(); view="dash"; render(); toast("已匯入 "+S.classes.length+" 個班級"); },"覆蓋匯入",true);
    }catch(e){ toast("檔案格式不正確"); } }; r.readAsText(f); }; inp.click(); }

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg){ let t=document.querySelector(".toast"); if(!t){ t=document.createElement("div"); t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; requestAnimationFrame(()=>t.classList.add("show")); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2400); }

(async function init(){ await loadState(); render(); })();
</script>
